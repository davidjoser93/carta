<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aunque existan millones de rosas</title>
    <style>
        /* Variables y Paleta de Colores Oscura */
        :root {
            --bg-gradient: radial-gradient(circle at 50% 50%, #1a1c29 0%, #0e1017 100%);
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-bg-hover: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(20px);
            --text-main: #f5f5f7;
            --text-muted: #8e8e93;
            --accent-color: #00a3ff;
            --shadow-dark: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-main);
            overflow: hidden;
        }

        /* Botón de descarga con efecto esmerilado */
        .download-btn {
            position: absolute;
            top: 24px;
            right: 24px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            color: var(--text-main);
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            z-index: 10;
        }

        .download-btn:hover {
            background: var(--glass-bg-hover);
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            color: var(--accent-color);
        }

        /* Contenedor principal estilo Glassmorphism */
        .player-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 28px;
            box-shadow: var(--shadow-dark);
            width: 90%;
            max-width: 380px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        /* Carátula */
        .cover {
            width: 260px;
            height: 260px;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.6);
            margin-bottom: 28px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .title {
            font-size: 1.25rem;
            font-weight: 500;
            margin-bottom: 28px;
            letter-spacing: -0.5px;
            color: var(--text-main);
            line-height: 1.4; /* Ajuste opcional para mejorar el espaciado entre las dos líneas */
        }

        /* Contenedor de la barra de tiempo */
        .progress-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 28px;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
        }

        /* Barra de progreso personalizada */
        input[type="range"] {
            flex-grow: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 5px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            outline: none;
            cursor: pointer;
            transition: background 0.3s;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--text-main);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            transition: transform 0.1s ease, background 0.3s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.3);
            background: var(--accent-color);
        }

        /* Controles de reproducción */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Botón Play/Pause Esmerilado */
        .play-pause-btn {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--text-main);
            border-radius: 50%;
            width: 68px;
            height: 68px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .play-pause-btn:hover {
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.3);
            transform: scale(1.06);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.4);
        }
        
        .play-pause-btn:active {
            transform: scale(0.98);
        }

        /* Estilo para los iconos internos */
        .play-pause-btn svg {
            transition: transform 0.2s ease;
        }
    </style>
</head>
<body>

    <a href="Aunque existan millones de rosas.mp3" download class="download-btn" title="Descargar MP3">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
    </a>

    <div class="player-card">
        <img src="Images.jpeg" alt="Carátula" class="cover">
        
        <h2 class="title">Aunque existan<br>millones de rosas</h2>
        
        <audio id="audio-player" src="Aunque existan millones de rosas.mp3"></audio>

        <div class="progress-container">
            <span id="current-time">0:00</span>
            <input type="range" id="progress-bar" value="0" max="100">
            <span id="duration">0:00</span>
        </div>

        <div class="controls">
            <button class="play-pause-btn" id="play-pause-btn" aria-label="Reproducir">
                <svg id="play-icon" xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M8 6.82v10.36c0 .79.86 1.28 1.54.88l8.14-5.18c.62-.39.62-1.31 0-1.7l-8.14-5.18c-.68-.4-1.54.09-1.54.88z"/>
                </svg>
                <svg id="pause-icon" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M6 20h4V4H6v16zm8-16v16h4V4h-4z"/>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const audio = document.getElementById('audio-player');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const progressBar = document.getElementById('progress-bar');
        const currentTimeEl = document.getElementById('current-time');
        const durationEl = document.getElementById('duration');

        // Formateador de tiempo (mm:ss)
        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        // Alternar estados Play/Pause
        playPauseBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
            } else {
                audio.pause();
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
            }
        });

        // Sincronizar la barra deslizante con el avance real del audio
        audio.addEventListener('timeupdate', () => {
            if (!audio.duration) return;
            const progress = (audio.currentTime / audio.duration) * 100;
            progressBar.value = progress;
            currentTimeEl.textContent = formatTime(audio.currentTime);
        });

        // Capturar metadatos del archivo para mostrar la duración exacta al cargar
        audio.addEventListener('loadedmetadata', () => {
            durationEl.textContent = formatTime(audio.duration);
        });

        // Permitir al usuario saltar a cualquier punto de la canción
        progressBar.addEventListener('input', () => {
            const seekTime = (progressBar.value / 100) * audio.duration;
            audio.currentTime = seekTime;
        });

        // Comportamiento al finalizar la reproducción de la pista
        audio.addEventListener('ended', () => {
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
            progressBar.value = 0;
            currentTimeEl.textContent = "0:00";
        });
    </script>
</body>
</html>
