<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Galería Minimalista</title>
    <style>
        /* Reseteo y fondo minimalista oscuro */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            background-color: #0a0a0a;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* Contenedor principal de la imagen */
        .visor-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #foto-actual {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: opacity 0.3s ease;
            user-select: none;
            -webkit-user-drag: none;
            opacity: 0;
        }

        /* Pantalla de carga (Transparente para los previews rápidos) */
        .pantalla-carga {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            opacity: 0;
            pointer-events: none;
            /* La mantenemos en el código pero invisible para no estorbar visualmente */
        }

        /* Estilos base para botones flotantes */
        .btn-flotante {
            background-color: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.2s ease, transform 0.2s ease, opacity 0.3s ease;
        }

        .btn-flotante:hover {
            background-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .btn-flotante svg {
            width: 24px;
            height: 24px;
        }

        /* Ocultar botones en los límites */
        .btn-oculto {
            opacity: 0 !important;
            pointer-events: none;
        }

        /* Botón de descarga */
        .btn-descarga {
            position: absolute;
            top: 24px;
            right: 24px;
            z-index: 10;
        }

        /* Controles de navegación inferiores */
        .nav-container {
            position: absolute;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center; /* Alinea verticalmente flechas y texto */
            gap: 24px;
            z-index: 10;
        }

        /* Texto del año */
        .anio-texto {
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 2px;
            width: 60px; /* Ancho fijo para que las flechas no se muevan de lugar */
            text-align: center;
            user-select: none;
        }
    </style>
</head>
<body>

    <a id="btn-descarga" href="#" download class="btn-flotante btn-descarga" title="Descargar foto en alta resolución">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
    </a>

    <div class="nav-container">
        <button id="btn-prev" class="btn-flotante btn-oculto" title="Foto anterior">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        </button>
        
        <span id="label-anio" class="anio-texto"></span>

        <button id="btn-next" class="btn-flotante" title="Foto siguiente">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
        </button>
    </div>

    <div class="visor-container" id="visor">
        <img id="foto-actual" src="" alt="Vista de fotografía">
    </div>

    <script>
        // 1. Configuración de Arrays (Previews vs Full Size)
        const totalFotos = 19;
        const fotosFull = [];
        const fotosPreview = [];

        for (let i = 1; i <= totalFotos; i++) {
            const numeroFormateado = String(i).padStart(2, '0');
            fotosFull.push(numeroFormateado + '.jpg');             // Ejemplo: 01.jpg
            fotosPreview.push(numeroFormateado + 'preview.jpg');   // Ejemplo: 01preview.jpg
        }

        let indiceActual = 0;
        let idPeticionCarga = 0;

        // Elementos del DOM
        const imgElement = document.getElementById('foto-actual');
        const btnDescarga = document.getElementById('btn-descarga');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const labelAnio = document.getElementById('label-anio');

        // 2. Lógica para determinar el año según el índice de la foto
        function obtenerAnio(indice) {
            const numeroFoto = indice + 1; // Convertimos de índice (0-18) a número real (1-19)
            
            if (numeroFoto >= 1 && numeroFoto <= 4) return "2022";
            if (numeroFoto >= 5 && numeroFoto <= 12) return "2023";
            if (numeroFoto === 13) return "2024";
            if (numeroFoto >= 14 && numeroFoto <= 17) return "2025";
            if (numeroFoto >= 18 && numeroFoto <= 19) return "2026";
            
            return ""; // Por defecto, por si acaso
        }

        // 3. Función principal de actualización visual
        function actualizarVisor() {
            const archivoPreview = fotosPreview[indiceActual];
            const archivoFull = fotosFull[indiceActual];
            const idActual = ++idPeticionCarga;
            
            // Ocultar/mostrar botones en los límites
            if (indiceActual === 0) {
                btnPrev.classList.add('btn-oculto');
            } else {
                btnPrev.classList.remove('btn-oculto');
            }

            if (indiceActual === totalFotos - 1) {
                btnNext.classList.add('btn-oculto');
            } else {
                btnNext.classList.remove('btn-oculto');
            }

            // Actualizar el texto del año
            labelAnio.innerText = obtenerAnio(indiceActual);
            
            // Efecto suave de transición de imagen
            imgElement.style.opacity = 0;
            
            // Configurar el botón de descarga para que apunte a la imagen pesada
            btnDescarga.href = archivoFull;
            btnDescarga.setAttribute('download', archivoFull);

            // Cargar el preview ligero en el visor
            imgElement.onload = () => {
                if (idActual === idPeticionCarga) {
                    imgElement.style.opacity = 1;
                }
            };
            
            imgElement.onerror = () => {
                if (idActual === idPeticionCarga) {
                    console.error("No se pudo cargar el preview:", archivoPreview);
                }
            };

            // Disparamos la carga de la miniatura
            imgElement.src = archivoPreview; 
        }

        // 4. Funciones de Navegación (con límites cerrados)
        function fotoSiguiente() {
            if (indiceActual < totalFotos - 1) {
                indiceActual++;
                actualizarVisor();
            }
        }

        function fotoAnterior() {
            if (indiceActual > 0) {
                indiceActual--;
                actualizarVisor();
            }
        }

        // Eventos en botones
        btnPrev.addEventListener('click', fotoAnterior);
        btnNext.addEventListener('click', fotoSiguiente);

        // 5. Swipe en pantallas táctiles
        let touchStartX = 0;
        let touchEndX = 0;
        const umbralSwipe = 50;

        function procesarSwipe() {
            const distancia = touchEndX - touchStartX;
            if (distancia > umbralSwipe) {
                fotoAnterior(); // Deslizar derecha
            } else if (distancia < -umbralSwipe) {
                fotoSiguiente(); // Deslizar izquierda
            }
        }

        document.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        });

        document.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            procesarSwipe();
        });

        // 6. Soporte para teclado
        document.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowLeft') {
                fotoAnterior();
            } else if(e.key === 'ArrowRight') {
                fotoSiguiente();
            }
        });

        // Carga inicial
        actualizarVisor();
    </script>
</body>
</html>
