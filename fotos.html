<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Galería Minimalista</title>
    <style>
        /* Reseteo y fondo minimalista oscuro */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            background-color: #0a0a0a;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* Contenedor principal de la imagen */
        .visor-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #foto-actual {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: opacity 0.3s ease;
            user-select: none;
            -webkit-user-drag: none;
            opacity: 0;
        }

        /* Pantalla de carga (Fondo negro) */
        .pantalla-carga {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0a0a0a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .pantalla-carga.activa {
            opacity: 1;
            pointer-events: all;
        }

        /* UI de la Barra de Progreso */
        .contenedor-progreso {
            width: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .texto-porcentaje {
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .barra-fondo {
            width: 100%;
            height: 4px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .barra-relleno {
            height: 100%;
            width: 0%;
            background-color: #ffffff;
            transition: width 0.1s linear; /* Movimiento fluido de la barra */
        }

        /* Estilos base para botones flotantes */
        .btn-flotante {
            background-color: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.2s ease, transform 0.2s ease, opacity 0.3s ease;
        }

        .btn-flotante:hover {
            background-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .btn-flotante svg {
            width: 24px;
            height: 24px;
        }

        /* Ocultar botones suavemente (usamos opacity en vez de display:none para que no se muevan de su sitio) */
        .btn-oculto {
            opacity: 0 !important;
            pointer-events: none;
        }

        /* Botón de descarga */
        .btn-descarga {
            position: absolute;
            top: 24px;
            right: 24px;
            z-index: 10;
        }

        /* Controles de navegación inferiores */
        .nav-container {
            position: absolute;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 24px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="pantalla-carga" class="pantalla-carga activa">
        <div class="contenedor-progreso">
            <span id="texto-porcentaje" class="texto-porcentaje">0%</span>
            <div class="barra-fondo">
                <div id="barra-relleno" class="barra-relleno"></div>
            </div>
        </div>
    </div>

    <a id="btn-descarga" href="#" download class="btn-flotante btn-descarga" title="Descargar foto">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
    </a>

    <div class="nav-container">
        <button id="btn-prev" class="btn-flotante btn-oculto" title="Foto anterior">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        </button>
        <button id="btn-next" class="btn-flotante" title="Foto siguiente">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
        </button>
    </div>

    <div class="visor-container" id="visor">
        <img id="foto-actual" src="" alt="Vista de fotografía">
    </div>

    <script>
        // 1. Configuración
        const totalFotos = 19;
        const fotos = [];
        for (let i = 1; i <= totalFotos; i++) {
            fotos.push(String(i).padStart(2, '0') + '.jpg');
        }

        let indiceActual = 0;
        let peticionActual = null; // Guardará la descarga en curso

        // Elementos del DOM
        const imgElement = document.getElementById('foto-actual');
        const btnDescarga = document.getElementById('btn-descarga');
        const pantallaCarga = document.getElementById('pantalla-carga');
        const textoPorcentaje = document.getElementById('texto-porcentaje');
        const barraRelleno = document.getElementById('barra-relleno');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');

        // 2. Función principal (Descarga con Progreso)
        function actualizarVisor() {
            const nombreArchivo = fotos[indiceActual];
            
            // Lógica para ocultar/mostrar botones en los límites
            if (indiceActual === 0) {
                btnPrev.classList.add('btn-oculto');
            } else {
                btnPrev.classList.remove('btn-oculto');
            }

            if (indiceActual === totalFotos - 1) {
                btnNext.classList.add('btn-oculto');
            } else {
                btnNext.classList.remove('btn-oculto');
            }
            
            // Reiniciar la interfaz de carga
            pantallaCarga.classList.add('activa');
            imgElement.style.opacity = 0;
            textoPorcentaje.innerText = '0%';
            barraRelleno.style.width = '0%';
            
            // Actualizar ruta del botón de descarga real
            btnDescarga.href = nombreArchivo;
            btnDescarga.setAttribute('download', nombreArchivo);

            // Si el usuario toca otro botón mientras cargaba una, cancelamos la descarga anterior
            if (peticionActual) {
                peticionActual.abort();
            }

            // Iniciamos la nueva descarga para poder medir el porcentaje
            peticionActual = new XMLHttpRequest();
            peticionActual.open('GET', nombreArchivo, true);
            peticionActual.responseType = 'blob'; // Pedimos la imagen como archivo crudo

            // Evento que se dispara mientras se descarga
            peticionActual.onprogress = function(evento) {
                if (evento.lengthComputable) {
                    const porcentaje = Math.round((evento.loaded / evento.total) * 100);
                    textoPorcentaje.innerText = porcentaje + '%';
                    barraRelleno.style.width = porcentaje + '%';
                } else {
                    // Por si el servidor falla en enviar el tamaño total
                    textoPorcentaje.innerText = 'Cargando...';
                }
            };

            // Evento cuando termina de descargar al 100%
            peticionActual.onload = function() {
                if (this.status === 200) {
                    // Convertimos los datos descargados a una URL que la etiqueta <img> pueda leer
                    const blob = this.response;
                    const objectURL = URL.createObjectURL(blob);

                    imgElement.onload = () => {
                        pantallaCarga.classList.remove('activa');
                        imgElement.style.opacity = 1;
                        // Liberamos la memoria del navegador
                        URL.revokeObjectURL(objectURL); 
                    };

                    imgElement.src = objectURL;
                }
            };

            peticionActual.onerror = function() {
                pantallaCarga.classList.remove('activa');
                console.error("No se pudo cargar la imagen:", nombreArchivo);
                textoPorcentaje.innerText = 'Error';
            };

            // Ejecutar petición
            peticionActual.send(); 
        }

        // 3. Funciones de Navegación (con límites cerrados)
        function fotoSiguiente() {
            if (indiceActual < totalFotos - 1) {
                indiceActual++;
                actualizarVisor();
            }
        }

        function fotoAnterior() {
            if (indiceActual > 0) {
                indiceActual--;
                actualizarVisor();
            }
        }

        // Eventos en botones
        btnPrev.addEventListener('click', fotoAnterior);
        btnNext.addEventListener('click', fotoSiguiente);

        // 4. Swipe en pantallas táctiles (respetando límites)
        let touchStartX = 0;
        let touchEndX = 0;
        const umbralSwipe = 50;

        function procesarSwipe() {
            const distancia = touchEndX - touchStartX;
            if (distancia > umbralSwipe) {
                fotoAnterior(); // Deslizar derecha
            } else if (distancia < -umbralSwipe) {
                fotoSiguiente(); // Deslizar izquierda
            }
        }

        document.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        });

        document.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            procesarSwipe();
        });

        // 5. Soporte para teclado (respetando límites)
        document.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowLeft') {
                fotoAnterior();
            } else if(e.key === 'ArrowRight') {
                fotoSiguiente();
            }
        });

        // Carga de la primera foto al abrir la página
        actualizarVisor();
    </script>
</body>
</html>
