<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aunque existan millones de rosas</title>

    <link href="assets/css/dflip.min.css" rel="stylesheet" type="text/css">
    <link href="assets/css/themify-icons.min.css" rel="stylesheet" type="text/css">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            /* Gris muy profundo para el fondo general */
            background-color: #121212; 
            overflow: hidden; 
        }
        
        .contenedor-revista {
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* ==================================================
           1. OCULTAR ELEMENTOS INNECESARIOS
           ================================================== */
        
        /* Oculta la barra de herramientas inferior */
        .df-ui-controls {
            display: none !important;
        }

        /* Oculta todos los botones genéricos por defecto */
        .df-ui-btn {
            display: none !important;
        }
        
        /* ==================================================
           2. DISEÑO DE LAS FLECHAS VISIBLES (SIGUIENTE/ANTERIOR)
           ================================================== */
        
        /* Mostrar los contenedores de las flechas y darles forma de botón */
        .df-ui-btn.df-ui-next,
        .df-ui-btn.df-ui-prev {
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            pointer-events: auto !important;
            
            /* Círculo de fondo semitransparente para que resalte */
            background-color: rgba(255, 255, 255, 0.15) !important;
            border-radius: 50% !important;
            width: 45px !important;
            height: 45px !important;
            
            /* Separarlos un poquito de los bordes de la pantalla */
            margin: 0 15px;
            
            /* Ocultar el color de texto base por si interfiere */
            color: transparent !important; 
        }

        /* Efecto al tocar/pasar el mouse por el botón */
        .df-ui-btn.df-ui-next:hover,
        .df-ui-btn.df-ui-prev:hover {
            background-color: rgba(255, 255, 255, 0.3) !important;
        }

        /* DIBUJAR FLECHAS BLANCAS CON CSS PURO (Garantiza que siempre se vean) */
        .df-ui-btn.df-ui-next::after,
        .df-ui-btn.df-ui-prev::after {
            content: '';
            display: block;
            width: 14px;
            height: 14px;
            border-top: 3px solid #ffffff;
            border-right: 3px solid #ffffff;
        }

        /* Flecha Siguiente (apunta a la derecha) */
        .df-ui-btn.df-ui-next::after {
            transform: rotate(45deg);
            margin-right: 4px; /* Centrado óptico */
        }

        /* Flecha Anterior (apunta a la izquierda) */
        .df-ui-btn.df-ui-prev::after {
            transform: rotate(-135deg);
            margin-left: 4px; /* Centrado óptico */
        }

        /* Anular los íconos de la librería original por si estaban ocultos o rotos */
        .df-ui-btn.df-ui-next::before,
        .df-ui-btn.df-ui-prev::before {
            display: none !important;
            content: none !important;
        }

    </style>
</head>
<body>

    <div class="contenedor-revista">
        <div class="_df_book" 
             id="mi_revista"
             source="carta.pdf" 
             option-webgl="false" 
             option-hard="cover"
             option-background-color="#121212">
        </div>
    </div>

    <script src="assets/js/jquery.min.js"></script>

    <script>
        // Configuración de la ubicación base para assets
        var dFlipLocation = "assets/";
    </script>

    <script src="assets/js/dflip.min.js"></script>

</body>
</html>
