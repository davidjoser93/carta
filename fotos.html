<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Galería Minimalista</title>
    <style>
        /* Reseteo y fondo minimalista oscuro */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            background-color: #0a0a0a;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* Contenedor principal de la imagen */
        .visor-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #foto-actual {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: opacity 0.3s ease;
            user-select: none;
            -webkit-user-drag: none;
            opacity: 0; /* Inicia oculta para la primera carga */
        }

        /* Pantalla de carga (Loader) */
        .pantalla-carga {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0a0a0a; /* Fondo negro */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5; /* Por encima de la foto, por debajo de los botones */
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .pantalla-carga.activa {
            opacity: 1;
            pointer-events: all;
        }

        /* Animación del spinner dando vueltas */
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #ffffff;
            border-radius: 50%;
            animation: girar 1s linear infinite;
        }

        @keyframes girar {
            to { transform: rotate(360deg); }
        }

        /* Estilos base para todos los botones flotantes */
        .btn-flotante {
            background-color: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.2s ease, transform 0.2s ease;
        }

        .btn-flotante:hover {
            background-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .btn-flotante svg {
            width: 24px;
            height: 24px;
        }

        /* Botón de descarga en la esquina superior derecha */
        .btn-descarga {
            position: absolute;
            top: 24px;
            right: 24px;
            z-index: 10;
        }

        /* Contenedor inferior para las flechas */
        .nav-container {
            position: absolute;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 24px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="pantalla-carga" class="pantalla-carga activa">
        <div class="spinner"></div>
    </div>

    <a id="btn-descarga" href="#" download class="btn-flotante btn-descarga" title="Descargar foto">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
    </a>

    <div class="nav-container">
        <button id="btn-prev" class="btn-flotante" title="Foto anterior">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        </button>
        <button id="btn-next" class="btn-flotante" title="Foto siguiente">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
        </button>
    </div>

    <div class="visor-container" id="visor">
        <img id="foto-actual" src="" alt="Vista de fotografía">
    </div>

    <script>
        // 1. Configuración de imágenes (del 01 al 19)
        const totalFotos = 19;
        const fotos = [];
        for (let i = 1; i <= totalFotos; i++) {
            fotos.push(String(i).padStart(2, '0') + '.jpg');
        }

        let indiceActual = 0;
        let idPeticionCarga = 0; // Evita conflictos si se presiona el botón muy rápido

        const imgElement = document.getElementById('foto-actual');
        const btnDescarga = document.getElementById('btn-descarga');
        const pantallaCarga = document.getElementById('pantalla-carga');

        // 2. Función para cargar y actualizar la vista
        function actualizarVisor() {
            const nombreArchivo = fotos[indiceActual];
            
            // Creamos un ID único para esta petición de carga
            const idActual = ++idPeticionCarga;
            
            // Mostramos la pantalla de carga y ocultamos la imagen
            pantallaCarga.classList.add('activa');
            imgElement.style.opacity = 0;
            
            // Creamos una imagen temporal para descargarla sin afectar la vista actual
            const imgTemp = new Image();
            
            imgTemp.onload = () => {
                // Solo actualizamos si esta es la última foto que el usuario pidió
                if (idActual === idPeticionCarga) {
                    imgElement.src = nombreArchivo;
                    btnDescarga.href = nombreArchivo;
                    btnDescarga.setAttribute('download', nombreArchivo);
                    
                    // Ocultamos la pantalla de carga y revelamos la imagen
                    pantallaCarga.classList.remove('activa');
                    imgElement.style.opacity = 1;

                    // Una vez cargada, precargamos las fotos adyacentes
                    precargarAdyacentes();
                }
            };
            
            imgTemp.onerror = () => {
                // Si hay error (ej. falta la foto), quitamos el loader para no dejar la pantalla negra infinita
                if (idActual === idPeticionCarga) {
                    pantallaCarga.classList.remove('activa');
                    console.error("Error al cargar la imagen: " + nombreArchivo);
                }
            };

            // Inicia la descarga
            imgTemp.src = nombreArchivo; 
        }

        // 3. Función para precargar imágenes y acelerar la navegación
        function precargarAdyacentes() {
            const indicePrev = (indiceActual > 0) ? indiceActual - 1 : totalFotos - 1;
            const indiceNext = (indiceActual < totalFotos - 1) ? indiceActual + 1 : 0;
            
            // Al asignar el src a un nuevo objeto Image, el navegador lo guarda en caché
            const imgNext = new Image();
            imgNext.src = fotos[indiceNext];
            
            const imgPrev = new Image();
            imgPrev.src = fotos[indicePrev];
        }

        // 4. Funciones de navegación
        function fotoSiguiente() {
            indiceActual = (indiceActual < totalFotos - 1) ? indiceActual + 1 : 0;
            actualizarVisor();
        }

        function fotoAnterior() {
            indiceActual = (indiceActual > 0) ? indiceActual - 1 : totalFotos - 1;
            actualizarVisor();
        }

        // Eventos de los botones de navegación
        document.getElementById('btn-prev').addEventListener('click', fotoAnterior);
        document.getElementById('btn-next').addEventListener('click', fotoSiguiente);

        // 5. Lógica para detectar el deslizamiento (Swipe) en pantallas táctiles
        let touchStartX = 0;
        let touchEndX = 0;
        const umbralSwipe = 50;

        function procesarSwipe() {
            const distancia = touchEndX - touchStartX;
            if (distancia > umbralSwipe) {
                fotoAnterior();
            } else if (distancia < -umbralSwipe) {
                fotoSiguiente();
            }
        }

        document.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        });

        document.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            procesarSwipe();
        });

        // 6. Soporte para flechas del teclado en PC
        document.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowLeft') {
                fotoAnterior();
            } else if(e.key === 'ArrowRight') {
                fotoSiguiente();
            }
        });

        // Carga inicial de la primera foto
        actualizarVisor();
    </script>
</body>
</html>
