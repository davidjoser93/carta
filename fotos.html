<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aunque existan millones de rosas</title>
    <style>
        /* Reseteo y fondo minimalista oscuro */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            background-color: #0a0a0a;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* Contenedor principal de la imagen */
        .visor-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #foto-actual {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: opacity 0.3s ease;
            user-select: none;
            -webkit-user-drag: none;
            opacity: 0;
        }

        /* Estilos base para botones flotantes */
        .btn-flotante {
            background-color: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.2s ease, transform 0.2s ease, opacity 0.3s ease;
        }

        .btn-flotante:hover {
            background-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .btn-flotante svg {
            width: 24px;
            height: 24px;
        }

        /* Ocultar botones en los límites */
        .btn-oculto {
            opacity: 0 !important;
            pointer-events: none;
        }

        /* Botón de descarga (Esquina superior derecha) */
        .btn-descarga {
            position: absolute;
            top: 24px;
            right: 24px;
            z-index: 10;
        }

        /* Botón de música (Esquina superior izquierda) */
        .btn-audio {
            position: absolute;
            top: 24px;
            left: 24px;
            z-index: 10;
        }

        /* Estado activo para el botón de música */
        .btn-audio.activo {
            background-color: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.4);
        }

        /* Controles de navegación inferiores */
        .nav-container {
            position: absolute;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 24px;
            z-index: 10;
        }

        /* Texto del año */
        .anio-texto {
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 2px;
            width: 60px;
            text-align: center;
            user-select: none;
        }
    </style>
</head>
<body>

    <audio id="bg-audio" loop>
        <source src="Aunque existan millones de rosas instrumental.mp3" type="audio/mpeg">
    </audio>

    <button id="btn-audio" class="btn-flotante btn-audio" title="Reproducir/Pausar música">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 18v-6a9 9 0 0 1 18 0v6"></path>
            <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path>
        </svg>
    </button>

    <a id="btn-descarga" href="#" download class="btn-flotante btn-descarga" title="Descargar foto en alta resolución">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
    </a>

    <div class="nav-container">
        <button id="btn-prev" class="btn-flotante btn-oculto" title="Foto anterior">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        </button>
        
        <span id="label-anio" class="anio-texto"></span>

        <button id="btn-next" class="btn-flotante" title="Foto siguiente">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
        </button>
    </div>

    <div class="visor-container" id="visor">
        <img id="foto-actual" src="" alt="Vista de fotografía">
    </div>

    <script>
        // 1. Configuración de Arrays
        const totalFotos = 19;
        const fotosFull = [];
        const fotosPreview = [];

        for (let i = 1; i <= totalFotos; i++) {
            const numeroFormateado = String(i).padStart(2, '0');
            fotosFull.push(numeroFormateado + '.jpg');             
            fotosPreview.push(numeroFormateado + 'preview.jpg');   
        }

        let indiceActual = 0;
        let idPeticionCarga = 0;

        // Elementos del DOM
        const imgElement = document.getElementById('foto-actual');
        const btnDescarga = document.getElementById('btn-descarga');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const labelAnio = document.getElementById('label-anio');
        
        // Elementos de Audio
        const btnAudio = document.getElementById('btn-audio');
        const bgAudio = document.getElementById('bg-audio');
        let isPlaying = false;

        // 2. Lógica de Audio
        btnAudio.addEventListener('click', () => {
            if (isPlaying) {
                bgAudio.pause();
                btnAudio.classList.remove('activo');
            } else {
                bgAudio.play();
                btnAudio.classList.add('activo');
            }
            isPlaying = !isPlaying;
        });

        // 3. Lógica para determinar el año
        function obtenerAnio(indice) {
            const numeroFoto = indice + 1; 
            
            if (numeroFoto >= 1 && numeroFoto <= 4) return "2022";
            if (numeroFoto >= 5 && numeroFoto <= 12) return "2023";
            if (numeroFoto === 13) return "2024";
            if (numeroFoto >= 14 && numeroFoto <= 17) return "2025";
            if (numeroFoto >= 18 && numeroFoto <= 19) return "2026";
            
            return ""; 
        }

        // 4. Función principal de actualización visual
        function actualizarVisor() {
            const archivoPreview = fotosPreview[indiceActual];
            const archivoFull = fotosFull[indiceActual];
            const idActual = ++idPeticionCarga;
            
            if (indiceActual === 0) {
                btnPrev.classList.add('btn-oculto');
            } else {
                btnPrev.classList.remove('btn-oculto');
            }

            if (indiceActual === totalFotos - 1) {
                btnNext.classList.add('btn-oculto');
            } else {
                btnNext.classList.remove('btn-oculto');
            }

            labelAnio.innerText = obtenerAnio(indiceActual);
            
            imgElement.style.opacity = 0;
            
            btnDescarga.href = archivoFull;
            btnDescarga.setAttribute('download', archivoFull);

            imgElement.onload = () => {
                if (idActual === idPeticionCarga) {
                    imgElement.style.opacity = 1;
                }
            };
            
            imgElement.onerror = () => {
                if (idActual === idPeticionCarga) {
                    console.error("No se pudo cargar el preview:", archivoPreview);
                }
            };

            imgElement.src = archivoPreview; 
        }

        // 5. Funciones de Navegación
        function fotoSiguiente() {
            if (indiceActual < totalFotos - 1) {
                indiceActual++;
                actualizarVisor();
            }
        }

        function fotoAnterior() {
            if (indiceActual > 0) {
                indiceActual--;
                actualizarVisor();
            }
        }

        btnPrev.addEventListener('click', fotoAnterior);
        btnNext.addEventListener('click', fotoSiguiente);

        // 6. Soporte para teclado
        document.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowLeft') {
                fotoAnterior();
            } else if(e.key === 'ArrowRight') {
                fotoSiguiente();
            }
        });

        // Carga inicial
        actualizarVisor();
    </script>
</body>
</html>
