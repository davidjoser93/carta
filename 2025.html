<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2025</title>
    <style>
        /* Reseteo y fondo minimalista oscuro */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            background-color: #0a0a0a;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* Contenedor principal de la imagen */
        .visor-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #foto-actual {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: opacity 0.3s ease;
            user-select: none;
            -webkit-user-drag: none;
            opacity: 0;
        }

        /* Estilos base para botones flotantes */
        .btn-flotante {
            background-color: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.2s ease, transform 0.2s ease, opacity 0.3s ease;
        }

        .btn-flotante:hover {
            background-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .btn-flotante svg {
            width: 24px;
            height: 24px;
        }

        /* Ocultar elementos suavemente */
        .btn-oculto {
            opacity: 0 !important;
            pointer-events: none;
        }

        /* Botón de descarga de imagen (Esquina superior derecha) */
        .btn-descarga-img {
            position: absolute;
            top: 24px;
            right: 24px;
            z-index: 10;
        }

        /* Contenedor de controles de audio (Esquina superior izquierda) */
        .audio-controls-container {
            position: absolute;
            top: 24px;
            left: 24px;
            z-index: 10;
            display: flex;
            gap: 16px; /* Espacio entre el botón de play y el de descarga de audio */
            transition: opacity 0.3s ease;
        }

        /* Estado activo para el botón de música */
        #btn-audio.activo {
            background-color: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.4);
        }

        /* Controles de navegación inferiores */
        .nav-container {
            position: absolute;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 24px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <!-- Audio global (la fuente se inyectará por JS) -->
    <audio id="bg-audio" loop></audio>

    <!-- Contenedor superior izquierdo: Audio y Descarga de Audio -->
    <div class="audio-controls-container btn-oculto" id="audio-controls">
        <button id="btn-audio" class="btn-flotante" title="Reproducir/Pausar música">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 18v-6a9 9 0 0 1 18 0v6"></path>
                <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path>
            </svg>
        </button>
        
        <a id="btn-descarga-audio" href="#" download class="btn-flotante" title="Descargar canción">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
        </a>
    </div>

    <!-- Botón superior derecho: Descarga de Imagen -->
    <a id="btn-descarga-img" href="#" download class="btn-flotante btn-descarga-img" title="Descargar foto en alta resolución">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
    </a>

    <!-- Navegación inferior -->
    <div class="nav-container">
        <button id="btn-prev" class="btn-flotante btn-oculto" title="Foto anterior">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        </button>
        
        <button id="btn-next" class="btn-flotante" title="Foto siguiente">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
        </button>
    </div>

    <!-- Visor de imagen -->
    <div class="visor-container" id="visor">
        <img id="foto-actual" src="" alt="Vista de fotografía">
    </div>

    <script>
        // 1. Configuración de Arrays y Canciones
        const totalFotos = 24; // Cambiado a 24 para quitar la última imagen
        const fotosFull = [];
        const fotosPreview = [];
        
        // Diccionario que vincula el índice de la foto con su respectiva canción
        // Índice 5 = foto 0006 | Índice 17 = foto 0018 | Índice 23 = foto 0024 (la nueva última foto)
        const canciones = {
            5: "Dorado y Mate.mp3",
            17: "Instante Eterno.mp3",
            23: "Instante Eterno Instrumental.mp3" // Añadida la canción para la nueva última foto
        };

        for (let i = 1; i <= totalFotos; i++) {
            const numeroFormateado = String(i).padStart(4, '0');
            fotosFull.push(numeroFormateado + '.png');             
            fotosPreview.push(numeroFormateado + 'p.jpg');   
        }

        let indiceActual = 0;
        let idPeticionCarga = 0;

        // Elementos del DOM
        const imgElement = document.getElementById('foto-actual');
        const btnDescargaImg = document.getElementById('btn-descarga-img');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        
        // Elementos de Audio
        const audioControls = document.getElementById('audio-controls');
        const btnAudio = document.getElementById('btn-audio');
        const btnDescargaAudio = document.getElementById('btn-descarga-audio');
        const bgAudio = document.getElementById('bg-audio');
        let isPlaying = false;

        // 2. Lógica de Audio
        btnAudio.addEventListener('click', () => {
            if (isPlaying) {
                bgAudio.pause();
                btnAudio.classList.remove('activo');
            } else {
                bgAudio.play();
                btnAudio.classList.add('activo');
            }
            isPlaying = !isPlaying;
        });

        // Función para detener la música al cambiar de foto
        function detenerAudio() {
            bgAudio.pause();
            bgAudio.currentTime = 0;
            isPlaying = false;
            btnAudio.classList.remove('activo');
        }

        // 3. Función principal de actualización visual
        function actualizarVisor() {
            // DETENER MÚSICA al cambiar de imagen
            detenerAudio();

            const archivoPreview = fotosPreview[indiceActual];
            const archivoFull = fotosFull[indiceActual];
            const idActual = ++idPeticionCarga;
            
            // Navegación (ocultar flechas en los extremos)
            if (indiceActual === 0) {
                btnPrev.classList.add('btn-oculto');
            } else {
                btnPrev.classList.remove('btn-oculto');
            }

            if (indiceActual === totalFotos - 1) {
                btnNext.classList.add('btn-oculto');
            } else {
                btnNext.classList.remove('btn-oculto');
            }
            
            // Lógica para mostrar/ocultar los botones de audio
            if (canciones[indiceActual]) {
                audioControls.classList.remove('btn-oculto');
                bgAudio.src = canciones[indiceActual];
                
                // Configurar enlace de descarga de la canción
                btnDescargaAudio.href = canciones[indiceActual];
                btnDescargaAudio.setAttribute('download', canciones[indiceActual]);
            } else {
                audioControls.classList.add('btn-oculto');
                bgAudio.removeAttribute('src');
            }

            // Transición de imagen
            imgElement.style.opacity = 0;
            
            // Actualizar descarga de imagen
            btnDescargaImg.href = archivoFull;
            btnDescargaImg.setAttribute('download', archivoFull);

            imgElement.onload = () => {
                if (idActual === idPeticionCarga) {
                    imgElement.style.opacity = 1;
                }
            };
            
            imgElement.onerror = () => {
                if (idActual === idPeticionCarga) {
                    console.error("No se pudo cargar el preview:", archivoPreview);
                }
            };

            imgElement.src = archivoPreview; 
        }

        // 4. Funciones de Navegación
        function fotoSiguiente() {
            if (indiceActual < totalFotos - 1) {
                indiceActual++;
                actualizarVisor();
            }
        }

        function fotoAnterior() {
            if (indiceActual > 0) {
                indiceActual--;
                actualizarVisor();
            }
        }

        btnPrev.addEventListener('click', fotoAnterior);
        btnNext.addEventListener('click', fotoSiguiente);

        // 5. Soporte para teclado (las flechas detendrán la música automáticamente porque llaman a fotoAnterior/Siguiente)
        document.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowLeft') {
                fotoAnterior();
            } else if(e.key === 'ArrowRight') {
                fotoSiguiente();
            }
        });

        // Carga inicial
        actualizarVisor();
    </script>
</body>
</html>
