<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aunque existan millones de rosas</title>

    <link href="assets/css/dflip.min.css" rel="stylesheet" type="text/css">
    <link href="assets/css/themify-icons.min.css" rel="stylesheet" type="text/css">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #121212; 
            overflow: hidden; 
        }
        
        .contenedor-revista {
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* ==================================================
           PERSONALIZACIÓN DE INTERFAZ (SOLO FLECHAS LATERALES)
           ================================================== */
        
        .df-ui-controls {
            display: none !important;
        }

        .df-ui-btn {
            display: none !important;
        }
        
        .df-ui-btn.df-ui-next,
        .df-ui-btn.df-ui-prev {
            display: flex !important; 
            pointer-events: auto !important; 
        }

        /* ==================================================
           ANIMACIÓN DEL INDICADOR DE TOQUE (MANITA)
           ================================================== */
        
        #indicador-toque {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); 
            z-index: 9999; 
            pointer-events: none; /* Atraviesa los clics hacia la revista */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* Color blanco levemente translúcido */
            color: rgba(255, 255, 255, 0.85); 
            
            /* Empieza oculto */
            opacity: 0; 
            visibility: hidden;
            transition: opacity 0.8s ease-in-out, visibility 0.8s ease-in-out; 
        }

        /* Clase que se añade por JS para mostrar la manita */
        #indicador-toque.visible {
            opacity: 1;
            visibility: visible;
        }

        .icono-manita {
            width: 75px; /* Un tamaño un poco más grande y claro */
            height: auto; 
            animation: latido 1.5s infinite ease-in-out; 
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.3));
        }

        @keyframes latido {
            0% { transform: scale(0.95); opacity: 0.7; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.7; }
        }

    </style>
</head>
<body>

    <!-- Animación flotante de la manita -->
    <div id="indicador-toque">
        <!-- SVG de mano detallado, inconfundible y profesional -->
        <svg class="icono-manita" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor">
            <path d="M6.75 1a.75.75 0 0 1 .75.75V8a.5.5 0 0 0 1 0V5.467l.086-.004c.316-.014.618-.061.914-.1432A.492.492 0 0 1 10.5 5.5v1.84a.5.5 0 0 0 1 0V6.5c0-.276.224-.5.5-.5s.5.224.5.5v1.34a.5.5 0 0 0 1 0V7.5c0-.276.224-.5.5-.5s.5.224.5.5v5.5a4.5 4.5 0 0 1-4.5 4.5h-2.5a4.5 4.5 0 0 1-4.5-4.5V3a.5.5 0 0 1 .5-.5h.5V1.75a.75.75 0 0 1 .75-.75M11.5 7.221A1.5 1.5 0 0 0 10.5 6.5v-.5a1.5 1.5 0 0 0-1-1.415V2.5a1.5 1.5 0 0 0-3 0v6.177a1.5 1.5 0 0 0-.616-.251l-.382-.038C4.542 8.303 4 8.784 4 9.38v4.12a3.5 3.5 0 0 0 3.5 3.5h2.5a3.5 3.5 0 0 0 3.5-3.5V7.5c0-.1-.033-.191-.088-.266z"/>
        </svg>
    </div>

    <div class="contenedor-revista">
        <div class="_df_book" 
             id="mi_revista"
             source="carta.pdf" 
             option-webgl="false" 
             option-hard="cover"
             option-background-color="#121212">
        </div>
    </div>

    <script src="assets/js/jquery.min.js"></script>

    <script>
        var dFlipLocation = "assets/";
    </script>

    <script src="assets/js/dflip.min.js"></script>

    <script>
        // ==================================================
        // LÓGICA DE APARICIÓN Y DESAPARICIÓN DE LA MANITA
        // ==================================================
        
        let usuarioYaToco = false;

        // 1. Mostrar después de 2 segundos de cargar la página
        window.addEventListener('load', function() {
            setTimeout(function() {
                // Si el usuario no ha tocado aún la pantalla, mostramos la manita
                if (!usuarioYaToco) {
                    var indicador = document.getElementById('indicador-toque');
                    if (indicador) {
                        indicador.classList.add('visible');
                    }
                }
            }, 2000); // 2000 milisegundos = 2 segundos
        });

        // 2. Desaparecer al primer toque en cualquier parte
        document.addEventListener('pointerdown', function() {
            usuarioYaToco = true; // Registramos que ya tocó
            var indicador = document.getElementById('indicador-toque');
            
            if (indicador) {
                // Forzamos la opacidad a 0 para que se desvanezca
                indicador.style.opacity = '0';
                
                // Lo eliminamos del DOM tras la transición
                setTimeout(function() {
                    indicador.remove();
                }, 800);
            }
        }, { once: true }); // Se ejecuta una sola vez
    </script>

</body>
</html>
