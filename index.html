<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aunque existan millones de rosas</title>

    <link href="assets/css/dflip.min.css" rel="stylesheet" type="text/css">
    <link href="assets/css/themify-icons.min.css" rel="stylesheet" type="text/css">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            /* Gris muy profundo para el fondo general */
            background-color: #121212; 
            overflow: hidden; 
        }
        
        .contenedor-revista {
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* ==================================================
           PERSONALIZACIÓN DE INTERFAZ (SOLO FLECHAS LATERALES)
           ================================================== */
        
        /* 1. Oculta toda la barra de herramientas inferior (zoom, compartir, etc.) */
        .df-ui-controls {
            display: none !important;
        }

        /* 2. Oculta todos los botones de la interfaz por defecto */
        .df-ui-btn {
            display: none !important;
        }
        
        /* 3. Fuerza a mostrar ÚNICAMENTE los botones de Siguiente y Anterior */
        .df-ui-btn.df-ui-next,
        .df-ui-btn.df-ui-prev {
            display: flex !important; /* Usamos flex para que el ícono siga centrado */
            pointer-events: auto !important; /* Asegura que sean clickeables */
        }

    </style>
</head>
<body>

    <div class="contenedor-revista">
        <div class="_df_book" 
             id="mi_revista"
             source="carta.pdf" 
             option-webgl="false" 
             option-hard="cover"
             option-background-color="#121212">
        </div>
    </div>

    <script src="assets/js/jquery.min.js"></script>

    <script>
        // Configuración de la ubicación base para assets
        var dFlipLocation = "assets/";
    </script>

    <script src="assets/js/dflip.min.js"></script>

</body>
</html>
