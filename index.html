<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aunque existan millones de rosas</title>

    <link href="assets/css/dflip.min.css" rel="stylesheet" type="text/css">
    <link href="assets/css/themify-icons.min.css" rel="stylesheet" type="text/css">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            /* Gris muy profundo para el fondo general */
            background-color: #121212; 
            overflow: hidden; 
        }
        
        .contenedor-revista {
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* ==================================================
           PERSONALIZACIÓN DE INTERFAZ (SOLO FLECHAS LATERALES)
           ================================================== */
        
        /* 1. Oculta toda la barra de herramientas inferior (zoom, compartir, etc.) */
        .df-ui-controls {
            display: none !important;
        }

        /* 2. Oculta todos los botones de la interfaz por defecto */
        .df-ui-btn {
            display: none !important;
        }
        
        /* 3. Fuerza a mostrar ÚNICAMENTE los botones de Siguiente y Anterior */
        .df-ui-btn.df-ui-next,
        .df-ui-btn.df-ui-prev {
            display: flex !important; /* Usamos flex para que el ícono siga centrado */
            pointer-events: auto !important; /* Asegura que sean clickeables */
        }

        /* ==================================================
           ANIMACIÓN DEL INDICADOR DE TOQUE (MANITA)
           ================================================== */
        
        #indicador-toque {
            position: fixed;
            top: 50%;
            left: 50%;
            /* Centra exactamente en el medio */
            transform: translate(-50%, -50%); 
            z-index: 9999; /* Asegura que esté por encima de todo */
            /* ¡ESTA ES LA CLAVE! Hace que el elemento sea intocable y no bloquee el clic hacia el PDF */
            pointer-events: none; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.8);
            transition: opacity 0.5s ease-out; /* Transición suave al desaparecer */
        }

        .icono-manita {
            width: 70px;
            height: 70px;
            /* Agrega la animación de pulso */
            animation: latido 1.5s infinite ease-in-out; 
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
        }

        @keyframes latido {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }

    </style>
</head>
<body>

    <div id="indicador-toque">
        <svg class="icono-manita" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 11V6a2 2 0 0 1 4 0v10"></path>
            <path d="M13 10V8a2 2 0 0 1 4 0v10"></path>
            <path d="M17 13v-1a2 2 0 0 1 4 0v7a5 5 0 0 1-5 5H9a7 7 0 0 1-7-7V9a2 2 0 0 1 4 0v6"></path>
            <path d="M12 2v2"></path>
            <path d="M15.5 3.5l-1.4 1.4"></path>
            <path d="M17 7h-2"></path>
        </svg>
    </div>

    <div class="contenedor-revista">
        <div class="_df_book" 
             id="mi_revista"
             source="carta.pdf" 
             option-webgl="false" 
             option-hard="cover"
             option-background-color="#121212">
        </div>
    </div>

    <script src="assets/js/jquery.min.js"></script>

    <script>
        // Configuración de la ubicación base para assets
        var dFlipLocation = "assets/";
    </script>

    <script src="assets/js/dflip.min.js"></script>

    <script>
        // ==================================================
        // LÓGICA PARA DESAPARECER LA MANITA AL TOCAR
        // ==================================================
        
        // Usamos 'pointerdown' porque captura tanto toques en pantallas móviles como clics de ratón
        document.addEventListener('pointerdown', function() {
            var indicador = document.getElementById('indicador-toque');
            
            if (indicador) {
                // Inicia la transición CSS de desvanecimiento
                indicador.style.opacity = '0';
                
                // Espera medio segundo (lo que dura la transición) para eliminarlo completamente del HTML
                setTimeout(function() {
                    indicador.remove();
                }, 500);
            }
        }, { once: true }); // { once: true } asegura que esta función se escuche y ejecute solo una vez para no gastar recursos
    </script>

</body>
</html>
