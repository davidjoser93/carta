<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diario - Modo Oscuro</title>

    <link href="assets/css/dflip.min.css" rel="stylesheet" type="text/css">
    <link href="assets/css/themify-icons.min.css" rel="stylesheet" type="text/css">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #2b2b2b;
            overflow: hidden; 
        }
        
        .contenedor-revista {
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* FILTRO DE MODO OSCURO: Invierte los colores de las páginas del PDF */
        .df-page-content, 
        .df-page-wrapper,
        canvas.df-page-canvas {
            filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%) !important;
        }
    </style>
</head>
<body>

    <div class="contenedor-revista">
        <div class="_df_book" 
             id="mi_revista"
             source="carta.pdf" 
             option-webgl="false" 
             option-hard="cover"
             option-background-color="#2b2b2b">
        </div>
    </div>

    <script src="assets/js/jquery.min.js"></script>

    <script>
        // Configuración de la ubicación base para assets
        var dFlipLocation = "assets/";
    </script>

    <script src="assets/js/dflip.min.js"></script>

</body>
</html>
