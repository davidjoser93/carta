<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diario - Modo Oscuro Total (Sin Botones)</title>

    <link href="assets/css/dflip.min.css" rel="stylesheet" type="text/css">
    <link href="assets/css/themify-icons.min.css" rel="stylesheet" type="text/css">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            /* Gris muy profundo para el fondo general */
            background-color: #121212; 
            overflow: hidden; 
        }
        
        .contenedor-revista {
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* ==================================================
           OCULTAR INTERFAZ DE USUARIO (SIN BOTONES)
           ================================================== */
        
        /* Esta regla oculta completamente la barra inferior, los botones laterales 
           y cualquier control visible de dFlip, dejando habilitada únicamente 
           la funcionalidad táctil y de arrastre para pasar las páginas. */
        .df-ui-wrapper {
            display: none !important;
        }

    </style>
</head>
<body>

    <div class="contenedor-revista">
        <div class="_df_book" 
             id="mi_revista"
             source="carta.pdf" 
             option-webgl="false" 
             option-hard="cover"
             option-background-color="#121212">
        </div>
    </div>

    <script src="assets/js/jquery.min.js"></script>

    <script>
        // Configuración de la ubicación base para assets
        var dFlipLocation = "assets/";
    </script>

    <script src="assets/js/dflip.min.js"></script>

</body>
</html>
